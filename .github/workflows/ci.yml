name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  app-checks:
    name: Expo and store readiness
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run check:type
      - run: npm run check:store-readiness

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Validate local StoreKit catalog
        run: jq empty store-readiness/SadhanaProducts.storekit

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --clean

      - name: Copy local StoreKit catalog into generated project
        run: |
          mkdir -p ios/StoreKit
          cp store-readiness/SadhanaProducts.storekit ios/StoreKit/SadhanaProducts.storekit

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: List generated Xcode workspace
        working-directory: ios
        run: |
          workspace="$(find . -maxdepth 1 -name '*.xcworkspace' -print -quit | sed 's#^\./##')"
          if [ -z "$workspace" ]; then
            echo "No generated .xcworkspace found in ios/"
            ls -la
            exit 66
          fi
          echo "Using workspace: $workspace"
          xcodebuild -list -workspace "$workspace"

      - name: Build iOS app
        working-directory: ios
        run: |
          workspace="$(find . -maxdepth 1 -name '*.xcworkspace' -print -quit | sed 's#^\./##')"
          if [ -z "$workspace" ]; then
            echo "No generated .xcworkspace found in ios/"
            ls -la
            exit 66
          fi
          xcodebuild \
            -workspace "$workspace" \
            -scheme "${workspace%.xcworkspace}" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            build
